lookup_vehicle:
  name: Look up vehicle
  description: Fetches full vehicle details from the Danish Motor API by registration number. Returns the full data as a response variable.
  fields:
    registration_number:
      name: Registration number
      description: The Danish vehicle registration (number plate), e.g. AB12345.
      required: true
      selector:
        text:
  response_fields:
    registration_number:
      description: The vehicle's registration number.
    status:
      description: Current registration status (e.g. Registreret).
    make:
      description: Vehicle manufacturer.
    model:
      description: Vehicle model name.
    variant:
      description: Model variant/trim.
    fuel_type:
      description: Fuel type (e.g. Benzin, Diesel, El).
    is_hybrid:
      description: Whether the vehicle is a hybrid.
    color:
      description: Vehicle colour.
    chassis_type:
      description: Body style (e.g. Stationcar, Sedan).
    first_registration:
      description: Date of first registration.
    vin:
      description: Vehicle Identification Number.
    mot_info:
      description: Latest MOT/inspection data including result and next inspection date.
